services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data/templates:/app/templates
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:80"
    depends_on:
      - backend
