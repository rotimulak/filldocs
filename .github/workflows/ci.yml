name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Backend tests
  backend-tests:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black mypy ruff

      - name: Lint with ruff
        working-directory: ./backend
        run: ruff check .

      - name: Format check with black
        working-directory: ./backend
        run: black --check .

      - name: Type check with mypy
        working-directory: ./backend
        run: mypy app/
        continue-on-error: true

      - name: Run unit tests
        working-directory: ./backend
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  # Frontend tests
  frontend-tests:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check
        continue-on-error: true

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend

  # Build test
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker Compose
        run: docker-compose build

      - name: Test Docker containers start
        run: |
          docker-compose up -d
          sleep 10
          curl -f http://localhost:8000/api/health || exit 1
          curl -f http://localhost:5173 || exit 1
          docker-compose down

  # Update Linear on success
  update-linear:
    name: Update Linear Issue
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, build-test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Extract issue ID from branch
        id: issue
        run: |
          BRANCH="${{ github.head_ref }}"
          ISSUE_ID=$(echo $BRANCH | grep -oP 'ROT-\d+' | head -1 || echo "")
          echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT

      - name: Comment on Linear issue
        if: steps.issue.outputs.issue_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          curl -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { commentCreate(input: { issueId: \"${{ steps.issue.outputs.issue_id }}\", body: \"✅ CI tests passed!\n\n- Backend tests: ✅\n- Frontend tests: ✅\n- Build test: ✅\n\nPR: ${{ github.event.pull_request.html_url }}\" }) { success } }"
            }'
